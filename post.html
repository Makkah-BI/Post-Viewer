<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Enhanced Post Viewer</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      form {
        background: #f4f4f4;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 2rem;
      }
      input,
      textarea {
        width: 100%;
        padding: 0.5rem;
        margin: 0.5rem 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        background: #007bff;
        color: white;
        border: none;
        padding: 0.6rem 1rem;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #0056b3;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      li {
        background: white;
        border: 1px solid #ddd;
        margin-bottom: 1rem;
        padding: 1rem;
        border-radius: 8px;
        position: relative;
      }
      li h3 {
        margin: 0 0 0.5rem;
      }
      li p {
        margin: 0 0 0.5rem;
        color: #555;
      }
      .delete-btn {
        background: #dc3545;
        color: white;
        border: none;
        padding: 0.3rem 0.8rem;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.8rem;
        position: absolute;
        top: 1rem;
        right: 1rem;
      }
      .delete-btn:hover {
        background: #c82333;
      }
      .error-msg {
        background: #f8d7da;
        color: #721c24;
        padding: 0.5rem;
        border-radius: 4px;
        margin-bottom: 1rem;
        display: none;
      }
      .success-msg {
        background: #d4edda;
        color: #155724;
        padding: 0.5rem;
        border-radius: 4px;
        margin-bottom: 1rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>Post Viewer</h1>
    <!-- Form for creating a new post -->
    <form id="post-form">
      <input type="text" id="title" placeholder="Post Title" required />
      <textarea id="body" placeholder="Post Body" rows="3" required></textarea>
      <button type="submit">Create Post</button>
    </form>
    <!-- Container for status messages -->
    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- List of posts -->
    <ul id="posts-list"></ul>

    <script>
      const form = document.getElementById("post-form");
      const titleInput = document.getElementById("title");
      const bodyInput = document.getElementById("body");
      const postsList = document.getElementById("posts-list");
      const errorMsgDiv = document.getElementById("error-msg");
      const successMsgDiv = document.getElementById("success-msg");

      function showMessage(element, text, isError = true) {
        element.textContent = text;
        element.style.display = "block";
        setTimeout(() => {
          element.style.display = "none";
        }, 3000);
      }

      function createPostElement(post) {
        const li = document.createElement("li");
        li.dataset.id = post.id;

        const title = document.createElement("h3");
        title.textContent = post.title;

        const body = document.createElement("p");
        body.textContent = post.body;

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "Delete";
        deleteBtn.classList.add("delete-btn");
        deleteBtn.addEventListener("click", async () => {
          if (!confirm("Are you sure you want to delete this post?")) return;

          try {
            const response = await fetch(
              `https://jsonplaceholder.typicode.com/posts/${post.id}`,
              {
                method: "DELETE",
              },
            );

            if (response.ok) {
              li.remove();
              showMessage(successMsgDiv, "Post deleted successfully!", false);
            } else {
              throw new Error("Failed to delete post");
            }
          } catch (err) {
            console.error("Delete error:", err);
            showMessage(errorMsgDiv, "Error deleting post. Please try again.");
          }
        });

        li.appendChild(title);
        li.appendChild(body);
        li.appendChild(deleteBtn);
        return li;
      }

      async function loadPosts() {
        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/posts?_limit=10",
          );
          if (!response.ok) throw new Error("Failed to fetch posts");
          const posts = await response.json();

          postsList.innerHTML = "";

          posts.forEach((post) => {
            const postElement = createPostElement(post);
            postsList.appendChild(postElement);
          });
        } catch (err) {
          console.error("Load posts error:", err);
          showMessage(
            errorMsgDiv,
            "Could not load posts. Please refresh the page.",
          );
        }
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const title = titleInput.value.trim();
        const body = bodyInput.value.trim();

        if (!title || !body) {
          showMessage(errorMsgDiv, "Both title and body are required.");
          return;
        }

        const newPost = {
          title: title,
          body: body,
          userId: 1,
        };

        try {
          const response = await fetch(
            "https://jsonplaceholder.typicode.com/posts",
            {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify(newPost),
            },
          );

          if (!response.ok) throw new Error("Failed to create post");

          const createdPost = await response.json();

          const newPostElement = createPostElement(createdPost);
          postsList.prepend(newPostElement);

          titleInput.value = "";
          bodyInput.value = "";

          showMessage(successMsgDiv, "Post created successfully!", false);
        } catch (err) {
          console.error("Create post error:", err);
          showMessage(errorMsgDiv, "Error creating post. Please try again.");
        }
      });

      loadPosts();
    </script>
  </body>
</html>
